server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_export
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org:
      springframework: ERROR